services:
  webapi.presentation:
    image: webapi.presentation
    build:
      context: .
      dockerfile: Src/Services/WebApi/WebApi.Presentation/Dockerfile
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: Development
    ports:
      - "8080:8080"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

  worker:
    image: gautracker.worker
    build:
      context: .
      dockerfile: Src/Services/Worker/Worker.Presentation/Dockerfile
    env_file:
      - .env
    environment:
      DOTNET_ENVIRONMENT: Development
    depends_on:
      - webapi.presentation
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 384M
        reservations:
          cpus: "0.10"
          memory: 192M
