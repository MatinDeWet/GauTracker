services:
  webapi.presentation:
    image: webapi.presentation
    build:
      context: .
      dockerfile: Src/Services/WebApi/WebApi.Presentation/Dockerfile
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: Development
    ports:
      - "8080:8080"

  worker:
    image: gautracker.worker
    build:
      context: .
      dockerfile: Src/Services/Worker/Worker.Presentation/Dockerfile
    env_file:
      - .env
    environment:
      # Generic host reads DOTNET_ENVIRONMENT (not ASPNETCORE_ENVIRONMENT).
      DOTNET_ENVIRONMENT: Development
    depends_on:
      # Let the API apply EF migrations before the worker starts touching the schema.
      - webapi.presentation
