# Pre-commit hooks for GauTracker.
# Install once per clone:  pre-commit install
# Run against everything:  pre-commit run --all-files
# See https://pre-commit.com and Docs/PreCommit.md
repos:
  # Secret scanning — blocks commits that contain credentials, keys, tokens, etc.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  # Secret-adjacent safety nets (these do not rewrite source files)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: detect-private-key        # extra guard for PEM/SSH private keys
      - id: check-added-large-files   # stop large/binary blobs sneaking in
      - id: check-merge-conflict
