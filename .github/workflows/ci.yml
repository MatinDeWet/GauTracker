name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # full history so gitleaks can scan every commit in the push/PR

      - name: Run gitleaks
        # Server-side enforcement of the same scan as the local pre-commit hook
        # (.pre-commit-config.yaml) — gates PRs even if a contributor skips it.
        # No GITLEAKS_LICENSE needed: this is a personal-account repo. An
        # organization-owned repo would require a (free) license — see Docs/PreCommit.md.
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write # dorny/test-reporter creates a check run with the test summary
      pull-requests: write # sticky coverage comment on PRs
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        # Directory.Build.props sets TreatWarningsAsErrors, so this gates on analyzer/style violations too.
        run: dotnet build --no-restore --configuration Release

      - name: Test
        # Emits a TRX (test results) and a Cobertura coverage report (via coverlet.collector).
        run: dotnet test --no-build --configuration Release --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage" --results-directory TestResults

      - name: Test Report
        # Publishes the TRX results as a check run with a pass/fail summary,
        # mirroring the secret-scan summary above.
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: ${{ !cancelled() }} # report results even when tests fail
        with:
          name: test results
          path: TestResults/*.trx
          reporter: dotnet-trx

      - name: Coverage Report
        # Renders the Cobertura report(s) into a GitHub-flavoured markdown summary
        # plus a browsable HTML report (uploaded as an artifact below).
        uses: danielpalme/ReportGenerator-GitHub-Action@049f7ec958c672fd31d5cc1cb01622dc8d2e23ab # 5.5.10
        if: ${{ !cancelled() }}
        with:
          reports: TestResults/*/coverage.cobertura.xml
          targetdir: CoverageReport
          reporttypes: MarkdownSummaryGithub;Html

      - name: Publish coverage to job summary
        if: ${{ !cancelled() }}
        run: cat CoverageReport/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"

      - name: Comment coverage on PR
        # Sticky comment: updates the same comment on each run instead of stacking new ones.
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        if: ${{ github.event_name == 'pull_request' && !cancelled() }}
        with:
          header: coverage
          path: CoverageReport/SummaryGithub.md

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: test-results
          path: TestResults

      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: coverage-report
          path: CoverageReport
