name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run gitleaks
        # Server-side enforcement of the same scan as the local pre-commit hook
        # (.pre-commit-config.yaml) — gates PRs even if a contributor skips it.
        # Version pinned to match the pre-commit gitleaks rev.
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks dir . --redact --no-banner --verbose

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        # Directory.Build.props sets TreatWarningsAsErrors, so this gates on analyzer/style violations too.
        run: dotnet build --no-restore --configuration Release

      - name: Test
        # No test project yet; this no-ops cleanly until one is added under Tests/.
        run: dotnet test --no-build --configuration Release --verbosity normal
