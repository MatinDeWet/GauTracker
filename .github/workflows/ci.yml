name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # full history so gitleaks can scan every commit in the push/PR

      - name: Run gitleaks
        # Server-side enforcement of the same scan as the local pre-commit hook
        # (.pre-commit-config.yaml) — gates PRs even if a contributor skips it.
        # No GITLEAKS_LICENSE needed: this is a personal-account repo. An
        # organization-owned repo would require a (free) license — see Docs/PreCommit.md.
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        # Directory.Build.props sets TreatWarningsAsErrors, so this gates on analyzer/style violations too.
        run: dotnet build --no-restore --configuration Release

      - name: Test
        # No test project yet; this no-ops cleanly until one is added under Tests/.
        run: dotnet test --no-build --configuration Release --verbosity normal
